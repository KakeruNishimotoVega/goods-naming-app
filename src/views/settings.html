<!-- ルール設定画面のテンプレート -->
<div id="settings-screen" class="screen" style="display: none;">
    <div class="page-container">
        <div class="page-header">
            <h1>ルール設定</h1>
            <p class="helper-text">カテゴリごとの入力項目と命名ルールを管理できます。</p>
        </div>

        <!-- カテゴリ選択カード -->
        <div class="form-card">
            <h3>Step 1: 大カテゴリを選択</h3>
            <div id="settings-parent-category-list" class="category-grid">
                <!-- 親カテゴリボタンが動的に追加される -->
            </div>
        </div>

        <!-- 子カテゴリ選択カード（親カテゴリ選択後に表示） -->
        <div id="settings-child-category-card" class="form-card" style="display: none;">
            <h3>Step 2: カテゴリを選択</h3>
            <div id="settings-child-category-list" class="category-grid">
                <!-- 子カテゴリボタンが動的に追加される -->
            </div>
        </div>

        <!-- Regulation（命名ルール）セクション -->
        <div id="regulations-section"></div>

        <!-- Type一覧 -->
        <div id="types-list"></div>
    </div>

    <!-- Type編集モーダル -->
    <div id="edit-type-modal" class="modal-backdrop">
        <div class="modal-content">
            <h3>入力項目の編集</h3>
            <form id="edit-type-form">
                <input type="hidden" id="edit-type-id" />

                <div class="form-group">
                    <label for="edit-type-key-name">キー名</label>
                    <input type="text" id="edit-type-key-name" class="form-control" readonly style="background-color: #f1f5f9; cursor: not-allowed;" />
                    <p class="text-sm text-muted mt-1">キー名は変更できません</p>
                </div>

                <div class="form-group">
                    <label for="edit-type-name">項目名 *</label>
                    <input type="text" id="edit-type-name" class="form-control" required />
                </div>

                <div class="form-group">
                    <label for="edit-type-description">説明</label>
                    <textarea id="edit-type-description" class="form-control" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label for="edit-type-placeholder">プレースホルダー</label>
                    <input type="text" id="edit-type-placeholder" class="form-control" placeholder="例: N人掛け" />
                    <p class="text-sm text-muted mt-1">テキスト入力型の場合に入力欄に表示されます</p>
                </div>

                <div class="form-group">
                    <label for="edit-type-selection">選択タイプ *</label>
                    <select id="edit-type-selection" class="form-control" required>
                        <option value="TEXT">テキスト入力</option>
                        <option value="SINGLE">単一選択</option>
                        <option value="MULTI">複数選択</option>
                        <option value="TRUE_FALSE">True/False</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="d-flex align-center gap-2">
                        <input type="checkbox" id="edit-type-required" />
                        <span>必須項目にする</span>
                    </label>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn secondary" onclick="closeModal('edit-type-modal')">キャンセル</button>
                    <button type="submit" class="btn primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Type追加モーダル -->
    <div id="add-type-modal" class="modal-backdrop">
        <div class="modal-content">
            <h3>入力項目の追加</h3>
            <form id="add-type-form">
                <div class="form-group">
                    <label for="add-type-name">項目名 *</label>
                    <input type="text" id="add-type-name" class="form-control" required placeholder="例: N人掛け" />
                    <p class="text-sm text-muted mt-1">項目名がそのままキー名として使用されます</p>
                </div>

                <div class="form-group">
                    <label for="add-type-description">説明</label>
                    <textarea id="add-type-description" class="form-control" rows="3" placeholder="この項目の説明（任意）"></textarea>
                </div>

                <div class="form-group">
                    <label for="add-type-placeholder">プレースホルダー</label>
                    <input type="text" id="add-type-placeholder" class="form-control" placeholder="例: N人掛け" />
                    <p class="text-sm text-muted mt-1">テキスト入力型の場合に入力欄に表示されます</p>
                </div>

                <div class="form-group">
                    <label for="add-type-selection">選択タイプ *</label>
                    <select id="add-type-selection" class="form-control" required>
                        <option value="TEXT">テキスト入力</option>
                        <option value="SINGLE">単一選択</option>
                        <option value="MULTI">複数選択</option>
                        <option value="TRUE_FALSE">True/False</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="d-flex align-center gap-2">
                        <input type="checkbox" id="add-type-required" />
                        <span>必須項目にする</span>
                    </label>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn secondary" onclick="closeModal('add-type-modal')">キャンセル</button>
                    <button type="submit" class="btn primary">追加</button>
                </div>
            </form>
        </div>
    </div>

    <!-- キーワード追加モーダル -->
    <div id="add-keyword-modal" class="modal-backdrop">
        <div class="modal-content">
            <h3>キーワードを追加</h3>
            <form id="add-keyword-form">
                <input type="hidden" id="add-keyword-type-id" />

                <div class="form-group">
                    <label for="add-keyword-text">キーワード *</label>
                    <input type="text" id="add-keyword-text" class="form-control" required placeholder="例: 2人掛け" />
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn secondary" onclick="closeModal('add-keyword-modal')">キャンセル</button>
                    <button type="submit" class="btn primary">追加</button>
                </div>
            </form>
        </div>
    </div>

    <!-- キーワード管理モーダル -->
    <div id="keywords-modal" class="modal-backdrop">
        <div class="modal-content" style="max-width: 800px;">
            <h3 id="keywords-modal-title">キーワード管理</h3>
            <input type="hidden" id="keywords-type-id" />

            <div class="mb-3">
                <button id="add-keyword-btn" class="btn btn-primary btn-sm">キーワードを追加</button>
            </div>

            <div id="keywords-list"></div>

            <div class="modal-actions">
                <button type="button" class="btn secondary" onclick="closeModal('keywords-modal')">閉じる</button>
            </div>
        </div>
    </div>

    <!-- Regulation編集モーダル -->
    <div id="edit-regulation-modal" class="modal-backdrop">
        <div class="modal-content" style="max-width: 800px;">
            <h3 id="regulation-modal-title">命名ルールの編集</h3>
            <form id="edit-regulation-form">
                <input type="hidden" id="edit-regulation-id" />

                <div class="form-group">
                    <label>対象</label>
                    <input type="text" id="edit-regulation-target" class="form-control" readonly />
                </div>

                <div class="form-group">
                    <label for="edit-regulation-pattern">パターン *</label>
                    <textarea id="edit-regulation-pattern" class="form-control" rows="4" required></textarea>
                    <p class="text-sm text-muted mt-1">プレースホルダー: {type_id} の形式で入力項目を参照できます</p>
                </div>

                <div id="placeholder-buttons" class="mb-3"></div>

                <div class="modal-actions">
                    <button type="button" id="cancel-regulation-edit" class="btn secondary">キャンセル</button>
                    <button type="submit" class="btn primary">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>
