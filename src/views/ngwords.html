<!-- NGワード管理画面のテンプレート -->
<div id="ngwords-screen" class="screen" style="display: none;">
    <div class="page-container">
        <div class="page-header">
            <div class="d-flex justify-between align-center">
                <div>
                    <h1>NGワード管理</h1>
                    <p class="helper-text">商品名に含めてはいけないワードを管理します。</p>
                </div>
                <button id="add-ngword-btn" class="btn primary">+ NGワード追加</button>
            </div>
        </div>

        <!-- NGワード一覧 -->
        <div id="ngwords-list" class="form-card">
            <table class="table">
                <thead>
                    <tr>
                        <th style="width: 30%;">NGワード</th>
                        <th style="width: calc(70% - 100px);">理由</th>
                        <th style="width: 100px;">削除</th>
                    </tr>
                </thead>
                <tbody id="ngwords-tbody">
                    <!-- 動的に生成 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- NGワード追加モーダル -->
    <div id="add-ngword-modal" class="modal-backdrop">
        <div class="modal-content">
            <h3>NGワードの追加</h3>
            <form id="add-ngword-form">
                <div class="form-group">
                    <label for="add-ngword-word">NGワード *</label>
                    <input type="text" id="add-ngword-word" class="form-control" required />
                </div>

                <div class="form-group">
                    <label for="add-ngword-reason">理由</label>
                    <textarea id="add-ngword-reason" class="form-control" rows="3"></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btnsecondary" onclick="closeModal('add-ngword-modal')">キャンセル</button>
                    <button type="submit" class="btnprimary">追加</button>
                </div>
            </form>
        </div>
    </div>

    <!-- NGワード編集モーダル -->
    <div id="edit-ngword-modal" class="modal-backdrop">
        <div class="modal-content">
            <h3>NGワードの編集</h3>
            <form id="edit-ngword-form">
                <input type="hidden" id="edit-ngword-id" />

                <div class="form-group">
                    <label for="edit-ngword-word">NGワード *</label>
                    <input type="text" id="edit-ngword-word" class="form-control" required />
                </div>

                <div class="form-group">
                    <label for="edit-ngword-reason">理由</label>
                    <textarea id="edit-ngword-reason" class="form-control" rows="3"></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btnsecondary" onclick="closeModal('edit-ngword-modal')">キャンセル</button>
                    <button type="submit" class="btnprimary">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>
