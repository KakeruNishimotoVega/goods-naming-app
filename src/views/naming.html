<!-- 命名画面のテンプレート -->
<div id="naming-screen" class="screen">
    <div class="page-container">
        <div class="page-header">
            <h1>商品命名</h1>
            <p class="helper-text">カテゴリを選択して、フォームに入力してください。リアルタイムで商品名が生成されます。</p>
        </div>

        <!-- カテゴリ選択パネル -->
        <div id="category-selection-panel">
            <!-- Step 1: 親カテゴリ -->
            <div id="parent-category-card" class="form-card">
                <h3>Step 1: 大カテゴリを選択</h3>
                <div id="parent-category-list" class="category-grid">
                    <!-- 親カテゴリボタンが動的に追加される -->
                </div>
            </div>

            <!-- Step 2: 子カテゴリ（親選択後に表示） -->
            <div id="child-category-card" class="form-card" style="display: none;">
                <h3>Step 2: カテゴリを選択</h3>
                <div id="child-category-list" class="category-grid">
                    <!-- 子カテゴリボタンが動的に追加される -->
                </div>
            </div>
        </div>

        <!-- 「変更」ボタンセクション（カテゴリ選択完了後に表示） -->
        <div id="category-toggle-section" style="display: none;">
            <div class="form-card">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div>
                        <p style="margin: 0; font-weight: 500; font-size: 0.875rem; color: var(--text-muted);">選択済み</p>
                        <p style="margin: 0.5rem 0 0 0; font-weight: 600;"><span id="selected-category-breadcrumb"></span></p>
                    </div>
                    <button id="change-category-btn" class="btn secondary">カテゴリを変更</button>
                </div>
            </div>
        </div>

        <!-- 動的フォーム -->
        <div id="dynamic-form"></div>

        <!-- 結果表示エリア（フローティング） -->
        <div id="naming-result" class="result-floating" style="display: none;">
            <div class="result-header">
                <h3>生成結果</h3>
                <button id="close-result-btn" class="btn-icon-close" aria-label="閉じる">×</button>
            </div>
            <div id="result-content"></div>
        </div>
    </div>
</div>
