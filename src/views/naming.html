<!-- 命名画面のテンプレート -->
<div id="naming-screen" class="screen">
    <div class="page-container">
        <div class="page-header">
            <h1>商品命名</h1>
            <p class="helper-text">カテゴリを選択して、フォームに入力してください。リアルタイムで商品名が生成されます。</p>
        </div>

        <!-- カテゴリ選択カード -->
        <div class="form-card">
            <h3>Step 1: 大カテゴリを選択</h3>
            <div id="parent-category-list" class="category-grid">
                <!-- 親カテゴリボタンが動的に追加される -->
            </div>
        </div>

        <!-- 子カテゴリ選択カード（親カテゴリ選択後に表示） -->
        <div id="child-category-card" class="form-card" style="display: none;">
            <h3>Step 2: カテゴリを選択</h3>
            <div id="child-category-list" class="category-grid">
                <!-- 子カテゴリボタンが動的に追加される -->
            </div>
        </div>

        <!-- 動的フォーム -->
        <div id="dynamic-form"></div>

        <!-- 結果表示エリア（フローティング） -->
        <div id="naming-result" class="result-floating" style="display: none;">
            <div class="result-header">
                <h3>生成結果</h3>
                <button id="close-result-btn" class="btn-icon-close" aria-label="閉じる">×</button>
            </div>
            <div id="result-content"></div>
        </div>
    </div>
</div>
